<!DOCTYPE html>

<html lang="en">

<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#FFCC00">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RDR2 Satchel Tracker</title>

    <link rel="stylesheet" href="css/style.css?v=1">

</head>

<body data-page="satchel">

    <header>

        <div class="nav-buttons">

            <form action="./index.html">
                <button type="submit">Satchels</button>
            </form>

            <form action="./trinket.html">
                <button type="submit">Talismans & Trinkets</button>
            </form>

        </div>

        <h1>Satchel Craft Tracker</h1>

        <div class="progressContainer">

            <div id="progressText"></div>

            <div class="progressBar">
                <div id="progressFill" class="progressEarly"></div>
            </div>

        </div>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <p id="progress-text"></p>

        <button id="resetProgress">Reset Progress</button>

    </header>

    <main>


        <div class="satchel tonic">

            <h2>Tonic Satchel</h2>

            <label>
                <input type="checkbox" data-id="satchel_deer">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_buck">
                <span>Perfect Buck Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_elk">
                <span>Perfect Elk Pelt</span>
            </label>

        </div>

        <div class="satchel provisions">

            <h2>Provisions Satchel</h2>

            <label>
                <input type="checkbox" data-id="satchel_provisions_deer">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_provisions_bison">
                <span>Perfect Bison Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_provisions_raccoon">
                <span>Perfect Raccoon Pelt</span>
            </label>

        </div>



        <div class="satchel materials">

            <h2>Materials Satchel</h2>

            <label>
                <input type="checkbox" data-id="satchel_materials_deer">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_materials_boar">
                <span>Perfect Boar Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_materials_iguana">
                <span>Perfect Iguana Pelt</span>
            </label>

        </div>



        <div class="satchel ingredients">

            <h2>Ingredients Satchel</h2>

            <label>
                <input type="checkbox" data-id="satchel_ingredients_deer">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_ingredients_badger">
                <span>Perfect Badger Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_ingredients_squirrel">
                <span>Perfect Squirrel Pelt</span>
            </label>

        </div>



        <div class="satchel valuables">

            <h2>Valuables Satchel</h2>

            <label>
                <input type="checkbox" data-id="satchel_valuables_deer">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_valuables_beaver">
                <span>Perfect Beaver Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_valuables_rabbit">
                <span>Perfect Rabbit Pelt</span>
            </label>

        </div>



        <div class="satchel kit">

            <h2>Kit Satchel</h2>

            <label>
                <input type="checkbox" data-id="satchel_kit_deer">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_kit_elk">
                <span>Perfect Elk Pelt</span>
            </label>

            <label>
                <input type="checkbox" data-id="satchel_kit_panther">
                <span>Perfect Panther Pelt</span>
            </label>

        </div>



        <div class="satchel legend">

            <h2>Legend of the East</h2>

            <p id="legendMessage">
                Craft all other satchels to unlock.
            </p>

            <label>
                <input type="checkbox" class="legendBox" data-id="satchel_legend_deer">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox" class="legendBox" data-id="satchel_legend_cougar">
                <span>Perfect Cougar Pelt</span>
            </label>

            <label>
                <input type="checkbox" class="legendBox" data-id="satchel_legend_wolf">
                <span>Perfect Wolf Pelt</span>
            </label>

        </div>


    </main>

    <script src="js/script_satchel.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js")
                    .then((reg) => console.log("Service Worker registrado:", reg))
                    .catch((err) => console.log("Erro no Service Worker:", err));
            });
        }
    </script>
</body>

</html>
