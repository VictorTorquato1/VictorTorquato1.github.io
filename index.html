<!DOCTYPE html>

<html lang="en">

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFCC00">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RDR2 Satchel Tracker</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>

        <h1>Satchel Craft Tracker</h1>

        <div class="progressContainer">

            <div id="progressText"></div>

            <div class="progressBar">
                <div id="progressFill" class="progressEarly"></div>
            </div>

        </div>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <p id="progress-text"></p>

        <button id="resetProgress">Reset Progress</button>

    </header>

    <main>


        <div class="satchel tonic">

            <h2>Tonic Satchel</h2>

            <label>
                <input type="checkbox">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Buck Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Elk Pelt</span>
            </label>

        </div>

        <div class="satchel provisions">

            <h2>Provisions Satchel</h2>

            <label>
                <input type="checkbox">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Bison Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Raccoon Pelt</span>
            </label>

        </div>



        <div class="satchel materials">

            <h2>Materials Satchel</h2>

            <label>
                <input type="checkbox">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Boar Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Iguana Pelt</span>
            </label>

        </div>



        <div class="satchel ingredients">

            <h2>Ingredients Satchel</h2>

            <label>
                <input type="checkbox">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Badger Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Squirrel Pelt</span>
            </label>

        </div>



        <div class="satchel valuables">

            <h2>Valuables Satchel</h2>

            <label>
                <input type="checkbox">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Beaver Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Rabbit Pelt</span>
            </label>

        </div>



        <div class="satchel kit">

            <h2>Kit Satchel</h2>

            <label>
                <input type="checkbox">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Elk Pelt</span>
            </label>

            <label>
                <input type="checkbox">
                <span>Perfect Panther Pelt</span>
            </label>

        </div>



        <div class="satchel legend">

            <h2>Legend of the East</h2>

            <p id="legendMessage">
                Craft all other satchels to unlock.
            </p>

            <label>
                <input type="checkbox" class="legendBox">
                <span>Perfect Deer Pelt</span>
            </label>

            <label>
                <input type="checkbox" class="legendBox">
                <span>Perfect Cougar Pelt</span>
            </label>

            <label>
                <input type="checkbox" class="legendBox">
                <span>Perfect Wolf Pelt</span>
            </label>

        </div>


    </main>

    <script src="js/script.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js")
                    .then((reg) => console.log("Service Worker registrado:", reg))
                    .catch((err) => console.log("Erro no Service Worker:", err));
            });
        }
    </script>
</body>

</html>
